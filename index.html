<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Admin Hub</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1>Home Admin Hub</h1>
  </header>

<section id="upcoming">
  <h2>Upcoming Payments</h2>
  <div id="upcoming-list"></div>
</section>

  <section id="utilities">
    <h2>Utilities</h2>
    <div id="utilities-list"></div>
    <button onclick="addUtility()">Add Utility</button>
  </section>

  <section id="insurance">
    <h2>Insurance</h2>
    <div id="insurance-list"></div>
    <button onclick="addInsurance()">Add Policy</button>
  </section>

  <section id="links">
    <h2>Quick Links</h2>
    <div id="links-grid" class="links-grid"></div>
    <button onclick="addQuickLink()">Add Quick Link</button>
  </section>

  <!-- Modal Editor -->
  <div id="edit-modal" class="modal">
    <div class="modal-content">
      <h3>Edit Item</h3>

      <label>Name / Label</label>
      <input id="edit-name" type="text">

      <label>Date (optional)</label>
      <input id="edit-date" type="date">

      <label>Link (URL)</label>
      <input id="edit-link" type="url">

      <div class="modal-buttons">
        <button id="save-edit">Save</button>
        <button id="cancel-edit" class="cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
